name: security_doctor
description: >-
  Security audit for Flutter and Dart apps: OWASP MASVS and CWE mapped checks
  for Dart code, configs and native manifests. Built for CI.
version: 0.6.0
repository: https://github.com/PopovVA/security_doctor

environment:
  sdk: ^3.5.0

executables:
  security_doctor:

# The demo app hardcodes fake credentials on purpose — it exists to
# demonstrate what this package detects.
false_secrets:
  - /example/vulnerable_app/lib/main.dart

dependencies:
  # 13.0.0 changed ArgumentList.arguments to NodeList<Argument>; the code
  # is written against the common surface so the whole range works.
  analyzer: ">=8.0.0 <15.0.0"
  args: ^2.7.0
  crypto: ^3.0.6
  glob: ^2.1.2
  xml: ">=6.5.0 <8.0.0"
  yaml: ^3.1.2

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.0
