name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart analyze --fatal-infos
      # Coverage gate: core coverage must stay at or above 80%.
      - run: dart pub global activate coverage
      - run: dart test --coverage=coverage
      - run: dart pub global run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib
      - name: Enforce coverage threshold
        run: |
          pct=$(awk -F: '/^LF/{lf+=$2} /^LH/{lh+=$2} END{printf "%.0f", (lh/lf)*100}' coverage/lcov.info)
          echo "line coverage: ${pct}%"
          [ "$pct" -ge 80 ]
      # Dependency audit (dogfooding the sibling package).
      - run: dart pub global activate pubspec_doctor
      - run: dart pub global run pubspec_doctor --fail-on-stale
      # pub.dev score guard; tighten the threshold as the package matures.
      - run: dart pub global activate pana
      - run: dart pub global run pana --no-warning --exit-code-threshold 60 .
      # Lower-bound check, mirroring pub.dev's downgrade analysis.
      - run: dart pub downgrade
      - run: dart analyze --fatal-infos
